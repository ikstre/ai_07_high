# DeskAd 앱 티어(Phase 1) — FastAPI 백엔드 + Streamlit 프론트엔드 2서비스.
#
# 전제: GPU 워커(ComfyUI/Omni/SEED 등)와 nginx는 호스트에 그대로 두고 앱만 컨테이너로 옮긴다.
#       단일 호스트이므로 network_mode: host로 호스트 네트워크를 공유한다 →
#       .env의 워커 URL(http://127.0.0.1:<port>)을 그대로 쓸 수 있고(별도 host.docker.internal 배선 불필요),
#       nginx :8443 → 127.0.0.1:8501 도 그대로 동작한다.
#       앱은 GPU_WORKER_MODE=always_on으로 워커를 직접 띄우지 않고 HTTP 호출만 한다(워커 수명주기=호스트 관리).
#       GPU 워커 컨테이너화는 Phase 2(별도 작업).
#
# 외부 노출: 두 서비스 모두 호스트 127.0.0.1에만 바인딩(loopback). 외부 접속은 호스트 nginx :8443.
#
# 빌드/실행(호스트 계정 UID로 빌드해야 bind 마운트에 쓸 수 있다):
#   DESKAD_UID=$(id -u) DESKAD_GID=$(id -g) docker compose up -d --build
# 확인: curl -fsS http://127.0.0.1:8010/health  /  브라우저 https://<VM_IP>:8443

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # 호스트 계정 UID/GID로 빌드 → bind 마운트(./data/runtime, ./static) 쓰기 권한 확보. 기본 1000.
        UID: "${DESKAD_UID:-1000}"
        GID: "${DESKAD_GID:-1000}"
    image: deskad-app:latest
    command: ["uvicorn", "backend.main:app", "--host", "127.0.0.1", "--port", "8010"]
    # 단일 호스트: 호스트 네트워크 공유 → .env의 127.0.0.1 워커 URL이 그대로 동작.
    network_mode: host
    env_file: .env
    environment:
      # 컨테이너에선 워커를 직접 띄우지 않고 HTTP 호출만 한다(.env가 exclusive여도 always_on으로 강제).
      GPU_WORKER_MODE: always_on
    volumes:
      # 쓰기 런타임(세션·이미지 잡·users.json 등). 이미지에 굽지 않고 호스트에 보존.
      - ./data/runtime:/app/data/runtime
      # 생성물(uploads/models/posters). 프론트엔드가 model-viewer로 읽으므로 공유 필요.
      - ./static:/app/static
      # (선택) 공유 라이브러리 기능을 쓸 때만. 모델 weight는 굽지 말고 호스트 디렉터리를 마운트.
      # - /opt/shared_data:/opt/shared_data
      # - /opt/shared_model:/opt/shared_model
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8010/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  frontend:
    # 백엔드와 동일 이미지를 재사용한다(중복 빌드 + 같은 태그 동시 export 경합 방지).
    # 이미지는 backend 서비스가 빌드하므로 여기선 빌드하지 않고 로컬 이미지를 그대로 쓴다.
    image: deskad-app:latest
    pull_policy: never
    command:
      - streamlit
      - run
      - streamlit_app.py
      - --server.port=8501
      - --server.address=127.0.0.1        # 호스트 네트워크: 127.0.0.1:8501에 바인딩. 외부는 nginx :8443.
      - --server.headless=true
      - --server.enableCORS=false
      - --server.enableXsrfProtection=true
    network_mode: host
    environment:
      # 호스트 네트워크라 백엔드는 127.0.0.1:8010.
      DESKAD_API_BASE: http://127.0.0.1:8010
      # 브라우저가 직접 받는 모델/포스터 URL용 외부 베이스(있으면). 미설정 시 DESKAD_API_BASE 사용.
      # DESKAD_PUBLIC_API_BASE: https://<VM_IP>:8443
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8501/"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
